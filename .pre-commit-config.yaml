repos:
- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: v1.23.1
  hooks:
    - id: zizmor
- repo: https://github.com/crate-ci/typos
  rev: v1.44.0
  hooks:
    - id: typos
- repo: https://github.com/tombi-toml/tombi-pre-commit
  rev: v0.9.5
  hooks:
    - id: tombi-format
    - id: tombi-lint
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.6
  hooks:
    - id: ruff-check
      args: [ --fix ]
    - id: ruff-format
